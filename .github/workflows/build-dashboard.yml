# Construit le tableau de bord du jeu Axel et le publie sur GitHub Pages.
# Collecte les metriques de contribution du depot du jeu, exporte le jeu Godot
# en HTML5 (best-effort), historise un instantane, puis deploie site/ sur Pages.
name: Build dashboard

on:
  schedule:
    - cron: "*/30 * * * *"   # toutes les 30 min (rendu du projet sous ~1 jour)
  workflow_dispatch: {}       # bouton « Run workflow » pour rafraichir a la demande

# Un seul deploiement Pages a la fois ; on ne coupe pas un deploiement en cours.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write   # commit de history/history.jsonl (tendances)
  pages: write      # deploiement Pages
  id-token: write   # OIDC pour deploy-pages

env:
  # Depot du jeu a analyser et a exporter. Surchargeable sans toucher au code.
  GAME_REPO: BANTI-Hugo-25004176/Game-Jam
  GODOT_VERSION: 4.7.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Recupere le tableau de bord
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Collecte des metriques de contribution
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DASHBOARD_REPO: ${{ env.GAME_REPO }}
          # Alias d'identite optionnels (JSON {"nom-git": "login"}) via variable de repo.
          DASHBOARD_ALIASES: ${{ vars.DASHBOARD_ALIASES }}
        run: python3 tools/collecte.py

      # ---- Export du jeu en HTML5 (best-effort : n'echoue jamais le job) -----
      - name: Recupere le code du jeu
        id: game_checkout
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GAME_REPO }}
          path: game

      - name: Installe Godot ${{ env.GODOT_VERSION }} + templates d'export
        id: setup_godot
        continue-on-error: true
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Exporte le jeu en HTML5
        id: export_game
        continue-on-error: true
        working-directory: game
        run: |
          set -e
          # Rendu compatible navigateur : Forward+/WebGPU est mal supporte sur le
          # web ; gl_compatibility (WebGL2) fonctionne partout. (Modif locale au
          # runner, le depot du jeu n'est pas touche.)
          cat >> project.godot <<'CFG'

          [rendering]

          renderer/rendering_method="gl_compatibility"
          renderer/rendering_method.mobile="gl_compatibility"
          CFG
          # Preset Web minimal (le depot du jeu n'en fournit pas). thread_support=false
          # car GitHub Pages n'envoie pas les en-tetes COOP/COEP requis par les threads.
          cat > export_presets.cfg <<'PRESET'
          [preset.0]
          name="Web"
          platform="Web"
          runnable=true
          advanced_options=false
          dedicated_server=false
          custom_features=""
          export_filter="all_resources"
          include_filter=""
          exclude_filter=""
          export_path="../site/play/index.html"
          encryption_include_filters=""
          encryption_exclude_filters=""
          encrypt_pck=false
          encrypt_directory=false

          [preset.0.options]
          custom_template/debug=""
          custom_template/release=""
          variant/extensions_support=false
          variant/thread_support=false
          vram_texture_compression/for_desktop=true
          vram_texture_compression/for_mobile=false
          html/export_icon=true
          html/custom_html_shell=""
          html/head_include=""
          html/canvas_resize_policy=2
          html/focus_canvas_on_start=true
          html/experimental_virtual_keyboard=false
          progressive_web_app/enabled=false
          PRESET
          mkdir -p ../site/play
          # Import des ressources (1er lancement headless), puis export.
          godot --headless --import . || true
          godot --headless --export-release "Web" ../site/play/index.html
          # GitHub Pages sert index.html par defaut : rien d'autre a faire.
          ls -la ../site/play

      - name: Renseigne le statut du build jeu dans data.json
        if: always()
        run: |
          python3 - <<'PY'
          import json, os, datetime
          p = "site/data.json"
          d = json.load(open(p, encoding="utf-8"))
          ok = os.path.exists("site/play/index.html")
          now = datetime.datetime.now(datetime.timezone.utc).isoformat()
          d["game"] = {
              "build_status": "success" if ok else "failed",
              "play_url": "play/index.html" if ok else None,
              "built_at": now if ok else None,
          }
          json.dump(d, open(p, "w", encoding="utf-8"), ensure_ascii=False, indent=2)
          print("game:", d["game"])
          PY

      - name: Historise l'instantane du jour
        run: |
          git config user.name "dashboard-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add history/
          if git diff --staged --quiet; then
            echo "Rien de nouveau a historiser."
          else
            git commit -m "chore: instantane d'avancement"
            for i in 1 2 3 4 5; do
              git push && { echo "Pousse."; break; }
              echo "Push rejete, rebase + nouvelle tentative ($i/5)..."
              git pull --rebase --autostash -X theirs origin "$(git rev-parse --abbrev-ref HEAD)" || git rebase --abort || true
            done
          fi

      - name: Prepare l'artefact Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploie sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
